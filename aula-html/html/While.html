<!DOCTYPE html>
<html>

<head>
    <title>estruturas de repetição</title>
    <meta charset="utf-8" />


    <script>

        let contador = 1
        const qtd = prompt("quantas notas")
        let soma = 0
        let nota = 0

        while (contador <= qtd) {

            do{
                nota = Number(prompt("diegite a nota" + contador))
            }while (nota > 10)

            nota = Number(prompt("digite sua nota" + contador))
            soma = soma + nota
            contador++
        }

        console.log("soma é " + soma)
        console.log("nota é " + nota)

        const media = soma / qtd
        console.log("à media é " + media)

        const resultado = media >= 7 ? "aprovado" : "reprovado"
        console.log("resultado" + resultado)



    </script>

</head>

</body>

</html>
