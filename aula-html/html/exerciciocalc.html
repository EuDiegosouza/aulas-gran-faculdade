<!DOCTYPE HTML>


<html>

<head>
  <title>javascript</title>
  <meta charset="utf-8" />

  <script>

    function somar() {

      const n1 = document.getElementById("n1").value
      const n2 = document.getElementById("n2").value
      const soma = Number(n1) + Number(n2)
      const resultado = document.getElementById("resultado")
        .innerHTML = "O resultado dos numeros é " + soma
    }

    function subtrair() {

      const n1 = document.getElementById("n1").value
      const n2 = document.getElementById("n2").value
      const subtrair = Number(n1) - Number(n2)
      const resultado = document.getElementById("resultado")
        .innerHTML = "O resultado dos numeros é " + subtrair
    }

    function multiplicar() {

      const n1 = document.getElementById("n1").value
      const n2 = document.getElementById("n2").value
      const multiplicar = Number(n1) * Number(n2)
      const resultado = document.getElementById("resultado")
        .innerHTML = "O resultado dos numeros é " + multiplicar
    }

    function dividir() {

      const n1 = document.getElementById("n1").value
      const n2 = document.getElementById("n2").value
      const dividir = Number(n1) / Number(n2)
      const resultado = document.getElementById("resultado")


      if (n2 === 0) {
        document.getElementById("resultado").innerHTML = "Não é possível dividir por zero!"
      } else {
        const dividir = Number(n1) / Number(n2)
        document.getElementById("resultado").innerHTML = "Resultado da divisão: " + dividir
      }



    }








  </script>


</head>

<body>

  <form action="">

    N1: <input type="text" id="n1" /><br>
    N2: <input type="text" id="n2" /><br>


    <input type="button" value="somar" onclick="somar()">
    <input type="button" value="subtrair" onclick="subtrair()">
    <input type="button" value="multiplicar" onclick="multiplicar()">
    <input type="button" value="dividir" onclick="dividir()">



    <h1 id="resultado">o resultado é </h1><br>



  </form>




</body>

</html>
